<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stripe API Scout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:          #0d0d0f;
      --surface:     #16161a;
      --surface-2:   #1e1e24;
      --border:      #2a2a33;
      --accent:      #635bff;
      --accent-dim:  #3d3799;
      --text:        #e8e8f0;
      --text-muted:  #7c7c99;
      --code-bg:     #121216;
      --success:     #30d158;
      --radius:      10px;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      flex-shrink: 0;
      padding: 18px 28px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--surface);
    }

    .logo {
      width: 32px;
      height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo svg {
      width: 18px;
      height: 18px;
      fill: #fff;
    }

    .header-text h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.2px;
      color: var(--text);
    }

    .header-text p {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    /* ── Chat area ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      scroll-behavior: smooth;
    }

    #chat::-webkit-scrollbar {
      width: 6px;
    }

    #chat::-webkit-scrollbar-track {
      background: transparent;
    }

    #chat::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    /* ── Empty state ── */
    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-muted);
      user-select: none;
      pointer-events: none;
    }

    #empty-state svg {
      width: 40px;
      height: 40px;
      opacity: 0.3;
    }

    #empty-state p {
      font-size: 14px;
    }

    /* ── Message bubbles ── */
    .message {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-width: 820px;
      width: 100%;
      align-self: flex-start;
    }

    .message.user {
      align-self: flex-end;
    }

    .bubble-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.4px;
      text-transform: uppercase;
      padding: 0 4px;
    }

    .message.user .bubble-label {
      text-align: right;
    }

    .bubble {
      padding: 14px 18px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.65;
      border: 1px solid var(--border);
    }

    .message.user .bubble {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: #ddd8ff;
      border-radius: var(--radius) var(--radius) 4px var(--radius);
    }

    .message.assistant .bubble {
      background: var(--surface);
      border-radius: var(--radius) var(--radius) var(--radius) 4px;
    }

    /* ── Code blocks inside answers ── */
    .bubble pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px 16px;
      overflow-x: auto;
      margin: 10px 0;
      font-size: 13px;
      line-height: 1.55;
    }

    .bubble pre::-webkit-scrollbar {
      height: 4px;
    }

    .bubble pre::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    .bubble code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: #c8c4ff;
    }

    .bubble p > code {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 12.5px;
    }

    /* ── Sources ── */
    .sources {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    .sources-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .sources ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .sources a {
      font-size: 12.5px;
      color: var(--accent);
      text-decoration: none;
      word-break: break-all;
      transition: color 0.15s;
    }

    .sources a:hover {
      color: #8f88ff;
      text-decoration: underline;
    }

    /* ── Loading indicator ── */
    .loading-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius) var(--radius) var(--radius) 4px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .dots {
      display: flex;
      gap: 4px;
    }

    .dots span {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
      animation: bounce 1.2s infinite ease-in-out;
    }

    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40%            { transform: translateY(-5px); opacity: 1; }
    }

    /* ── Input bar ── */
    #input-bar {
      flex-shrink: 0;
      padding: 16px 28px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      max-width: 820px;
      margin: 0 auto;
    }

    #question-input {
      flex: 1;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      line-height: 1.5;
      padding: 11px 14px;
      resize: none;
      outline: none;
      min-height: 46px;
      max-height: 140px;
      overflow-y: auto;
      transition: border-color 0.15s;
    }

    #question-input::placeholder {
      color: var(--text-muted);
    }

    #question-input:focus {
      border-color: var(--accent);
    }

    #send-btn {
      flex-shrink: 0;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      padding: 11px 20px;
      height: 46px;
      display: flex;
      align-items: center;
      gap: 7px;
      transition: background 0.15s, opacity 0.15s;
      white-space: nowrap;
    }

    #send-btn:hover:not(:disabled) {
      background: #7b74ff;
    }

    #send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #send-btn svg {
      width: 15px;
      height: 15px;
      fill: currentColor;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <!-- Stripe-style bolt -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M13 2L4.5 13.5H11L10 22L20.5 10H14L13 2Z"/>
      </svg>
    </div>
    <div class="header-text">
      <h1>Stripe API Scout</h1>
      <p>Ask anything about Stripe's API</p>
    </div>
  </header>

  <div id="chat">
    <div id="empty-state">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"
              stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <p>Ask a question to get started</p>
    </div>
  </div>

  <div id="input-bar">
    <div class="input-row">
      <textarea
        id="question-input"
        placeholder="e.g. How do I create a PaymentIntent with automatic confirmation?"
        rows="1"
        autocomplete="off"
        spellcheck="true"
      ></textarea>
      <button id="send-btn">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22 2L11 13M22 2L15 22L11 13M22 2L2 9L11 13"/>
        </svg>
        Send
      </button>
    </div>
  </div>

  <script>
    const API_BASE = 'https://stripe-api-scout.onrender.com';

    const sessionId = crypto.randomUUID();

    const chat        = document.getElementById('chat');
    const emptyState  = document.getElementById('empty-state');
    const input       = document.getElementById('question-input');
    const sendBtn     = document.getElementById('send-btn');

    // Auto-resize textarea
    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 140) + 'px';
    });

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    sendBtn.addEventListener('click', send);

    function setLoading(on) {
      sendBtn.disabled = on;
      input.disabled   = on;
    }

    function hideEmptyState() {
      if (emptyState) emptyState.remove();
    }

    function appendMessage(role, content) {
      hideEmptyState();
      const msg = document.createElement('div');
      msg.className = `message ${role}`;

      const label = document.createElement('div');
      label.className = 'bubble-label';
      label.textContent = role === 'user' ? 'You' : 'Scout';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';

      if (role === 'user') {
        bubble.textContent = content;
      } else {
        bubble.innerHTML = renderMarkdown(content.answer);

        if (content.sources && content.sources.length > 0) {
          const sources = document.createElement('div');
          sources.className = 'sources';
          sources.innerHTML = `<div class="sources-label">Sources</div>`;
          const ul = document.createElement('ul');
          content.sources.forEach(url => {
            const li = document.createElement('li');
            const a  = document.createElement('a');
            a.href        = url;
            a.textContent = url;
            a.target      = '_blank';
            a.rel         = 'noopener noreferrer';
            li.appendChild(a);
            ul.appendChild(li);
          });
          sources.appendChild(ul);
          bubble.appendChild(sources);
        }
      }

      msg.appendChild(label);
      msg.appendChild(bubble);
      chat.appendChild(msg);
      chat.scrollTop = chat.scrollHeight;
      return msg;
    }

    function appendLoading() {
      hideEmptyState();
      const msg = document.createElement('div');
      msg.className = 'message assistant';

      const label = document.createElement('div');
      label.className = 'bubble-label';
      label.textContent = 'Scout';

      const bubble = document.createElement('div');
      bubble.className = 'loading-bubble';
      bubble.innerHTML = `
        <div class="dots">
          <span></span><span></span><span></span>
        </div>
        Searching Stripe docs…
      `;

      msg.appendChild(label);
      msg.appendChild(bubble);
      chat.appendChild(msg);
      chat.scrollTop = chat.scrollHeight;
      return msg;
    }

    // Minimal markdown renderer: fenced code blocks + inline code
    function renderMarkdown(text) {
      // Fenced code blocks: ```lang\n...\n```
      text = text.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
        return `<pre><code>${escapeHtml(code.trimEnd())}</code></pre>`;
      });

      // Inline code
      text = text.replace(/`([^`]+)`/g, (_, code) => {
        return `<code>${escapeHtml(code)}</code>`;
      });

      // Bold before italic so **text** is matched before *text*
      text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      text = text.replace(/\*([^*]+)\*/g, '<em>$1</em>');

      // Paragraphs: split on double newlines
      const parts = text.split(/\n{2,}/);
      return parts.map(part => {
        if (part.startsWith('<pre>')) return part;
        return `<p>${part.replace(/\n/g, '<br>')}</p>`;
      }).join('');
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    async function send() {
      const question = input.value.trim();
      if (!question) return;

      appendMessage('user', question);
      input.value = '';
      input.style.height = 'auto';
      setLoading(true);

      const loadingEl = appendLoading();

      try {
        const res = await fetch(`${API_BASE}/api/ask`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ question, session_id: sessionId }),
        });

        loadingEl.remove();

        if (!res.ok) {
          const err = await res.text();
          appendMessage('assistant', {
            answer:  `Error ${res.status}: ${err || 'Something went wrong.'}`,
            sources: [],
          });
          return;
        }

        const data = await res.json();
        appendMessage('assistant', {
          answer:  data.answer  ?? 'No answer returned.',
          sources: data.sources ?? [],
        });
      } catch (err) {
        loadingEl.remove();
        appendMessage('assistant', {
          answer:  `Could not reach the server. Make sure the backend is running at ${API_BASE}.`,
          sources: [],
        });
      } finally {
        setLoading(false);
        input.focus();
      }
    }
  </script>
</body>
</html>
